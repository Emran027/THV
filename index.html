<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Territory Hierarchy Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --surface3: #30363d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #6e7681;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --warn: #d29922;
    --danger: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

  /* UPLOAD */
  #upload-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; gap: 24px; }
  .brand h1 { font-size: 26px; font-weight: 700; color: var(--accent); text-align: center; }
  .brand p { color: var(--text-muted); margin-top: 6px; font-size: 13px; text-align: center; }
  .upload-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 18px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; }
  .field input[type="text"] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .field input[type="text"]:focus { border-color: var(--accent); }
  .drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 28px 16px; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(88,166,255,0.05); }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .dz-icon { font-size: 32px; margin-bottom: 8px; }
  .dz-text { color: var(--text-muted); font-size: 12px; }
  .dz-file { color: var(--accent2); font-weight: 600; margin-top: 5px; font-size: 12px; }
  .btn-primary { background: var(--accent); color: #0d1117; border: none; border-radius: 8px; padding: 11px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: opacity 0.2s; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
  .error-msg { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: 8px; padding: 10px 14px; color: var(--danger); font-size: 12px; display: none; }

  /* APP */
  #app-screen { display: none; flex-direction: column; min-height: 100vh; }
  .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 11px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .company-badge { background: rgba(88,166,255,0.12); border: 1px solid rgba(88,166,255,0.3); border-radius: 6px; padding: 4px 12px; color: var(--accent); font-weight: 700; font-size: 13px; }
  .top-stats { color: var(--text-muted); font-size: 12px; display: flex; gap: 14px; flex-wrap: wrap; }
  .btn-reset { margin-left: auto; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; }
  .btn-reset:hover { color: var(--text); }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; gap: 2px; }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 11px 14px; color: var(--text-muted); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-badge { background: var(--surface3); border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
  .tab-btn.active .tab-badge { background: rgba(88,166,255,0.18); color: var(--accent); }

  .tab-panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-panel.active { display: flex; }

  /* TREE */
  .tree-toolbar { padding: 11px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: var(--surface); }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 360px; }
  .search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 11px 7px 32px; color: var(--text); font-size: 13px; outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; pointer-events: none; }
  .search-count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .btn-sm { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 11px; color: var(--text-muted); font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .btn-sm:hover { color: var(--text); border-color: var(--text-muted); }

  .tree-container { flex: 1; overflow-y: auto; padding: 12px 16px; }

  /* Tree nodes */
  .tn { /* tree node wrapper */ }
  .tn-row { display: flex; align-items: flex-start; }
  .tn-guides { display: flex; flex-shrink: 0; }
  .tn-guide { width: 20px; border-left: 1px solid #30363d55; margin-left: 8px; flex-shrink: 0; min-height: 100%; }
  .tn-toggle { width: 20px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-dim); font-size: 9px; flex-shrink: 0; user-select: none; }
  .tn-toggle:hover { color: var(--accent); }
  .tn-toggle.leaf { cursor: default; color: transparent; }

  .node-card { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; margin: 2px 0 2px 2px; transition: border-color 0.15s; min-width: 0; }
  .node-card:hover { border-color: #444c56; }
  .node-card.search-match { border-color: var(--accent2) !important; background: rgba(63,185,80,0.06) !important; }

  .node-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .lv-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px; flex-shrink: 0; }
  .node-code { font-family: 'Consolas', monospace; font-size: 11px; color: var(--text-dim); background: var(--surface2); padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }
  .node-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .node-mgrs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .mgr-chip { font-size: 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; color: var(--text-muted); }

  .tn-children { padding-left: 0; }
  .tn-children.collapsed { display: none; }

  /* DUP */
  .dup-container { flex: 1; overflow-y: auto; padding: 18px; }
  .dup-empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .dup-empty .ico { font-size: 36px; margin-bottom: 10px; }
  .dup-group { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 12px; overflow: hidden; }
  .dup-hdr { background: rgba(248,81,73,0.07); border-bottom: 1px solid rgba(248,81,73,0.18); padding: 11px 15px; display: flex; align-items: center; gap: 8px; }
  .dup-name { font-weight: 700; color: var(--danger); font-size: 13px; flex: 1; }
  .dup-lv { font-size: 11px; color: var(--text-muted); }
  .dup-cnt { background: rgba(248,81,73,0.18); color: var(--danger); border-radius: 10px; padding: 1px 9px; font-size: 11px; font-weight: 700; }
  .dup-items { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
  .dup-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; }
  .dup-item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; flex-wrap: wrap; }
  .dup-code { font-family: monospace; font-size: 12px; color: var(--warn); background: rgba(210,153,34,0.1); padding: 2px 7px; border-radius: 4px; }
  .dup-ctx { display: flex; flex-direction: column; gap: 4px; }
  .dup-ctx-row { display: flex; gap: 8px; align-items: flex-start; font-size: 12px; }
  .dclbl { color: var(--text-dim); min-width: 65px; font-weight: 600; text-transform: uppercase; font-size: 10px; padding-top: 2px; flex-shrink: 0; }
  .dcval { color: var(--text-muted); display: flex; flex-wrap: wrap; gap: 3px; }
  .dcval span { background: var(--surface3); border-radius: 4px; padding: 1px 7px; font-size: 11px; color: var(--text); }

  /* SUMMARY */
  .summary-container { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .sum-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .sum-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .sum-lv { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .sum-count { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 3px; }
  .sum-sub { font-size: 11px; color: var(--text-muted); }
  .lv-table { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .lv-table table { width: 100%; border-collapse: collapse; }
  .lv-table th { background: var(--surface2); padding: 9px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--border); }
  .lv-table td { padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
  .lv-table tr:last-child td { border-bottom: none; }
  .lv-table tr:hover td { background: var(--surface2); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* FLOW VIEW */
  #tab-flow { flex-direction: column; }
  .flow-toolbar { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .breadcrumb { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 0; flex-wrap: wrap; }
  .bc-item { font-size: 12px; color: var(--accent); cursor: pointer; padding: 3px 8px; border-radius: 5px; background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.2); white-space: nowrap; transition: background 0.15s; }
  .bc-item:hover { background: rgba(88,166,255,0.18); }
  .bc-item.bc-root { color: var(--text-muted); background: var(--surface2); border-color: var(--border); }
  .bc-sep { color: var(--text-dim); font-size: 11px; }
  .bc-current { font-size: 12px; color: var(--text); font-weight: 600; padding: 3px 8px; }

  .flow-wrap { flex: 1; overflow: hidden; display: flex; position: relative; }
  .flow-canvas-wrap { flex: 1; overflow-x: auto; overflow-y: auto; position: relative; }
  #flow-svg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0; }
  .flow-columns { display: flex; align-items: flex-start; gap: 0; padding: 20px 24px; position: relative; z-index: 1; min-height: 100%; width: max-content; }

  .flow-col { display: flex; flex-direction: column; gap: 0; min-width: 220px; max-width: 240px; position: relative; }
  .flow-col-header { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 8px 10px 8px; border-bottom: 2px solid var(--accent); margin-bottom: 10px; white-space: nowrap; }

  .flow-col-spacer { width: 48px; flex-shrink: 0; } /* gap between columns for curves */

  .flow-node {
    display: flex; flex-direction: column; padding: 8px 10px;
    margin: 3px 8px; border-radius: 7px;
    background: var(--surface); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.18s; position: relative;
    user-select: none;
  }
  .flow-node:hover { border-color: var(--accent); background: var(--surface2); transform: translateX(2px); }
  .flow-node.fn-active { border-color: var(--accent) !important; background: rgba(88,166,255,0.1) !important; }
  .flow-node.fn-dim { opacity: 0.35; }
  .flow-node.fn-child-active { border-color: var(--accent2); background: rgba(63,185,80,0.07); }

  .fn-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
  .fn-code { font-family: monospace; font-size: 10px; color: var(--text-dim); margin-bottom: 5px; }
  .fn-bar-wrap { height: 4px; background: var(--surface3); border-radius: 2px; margin-bottom: 3px; overflow: hidden; }
  .fn-bar { height: 100%; border-radius: 2px; background: var(--accent2); transition: width 0.3s; }
  .fn-count { font-size: 10px; color: var(--text-muted); }
  .fn-mgr { font-size: 10px; color: var(--text-dim); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fn-search-hit { border-color: #f78166 !important; background: rgba(247,129,102,0.15) !important; box-shadow: 0 0 0 2px rgba(247,129,102,0.4); }

  .flow-empty { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text-muted); font-size: 13px; flex-direction: column; gap: 8px; padding: 40px; text-align: center; }

  #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(13,17,23,0.88); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  #loading-overlay.show { display: flex; }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 13px; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Processing file...</div>
</div>

<!-- UPLOAD -->
<div id="upload-screen">
  <div class="brand">
    <h1>⬡ Territory Hierarchy Viewer</h1>
    <p>Upload any Sokrio territory bulk export to explore the full hierarchy</p>
  </div>
  <div class="upload-card">
    <div class="field">
      <label>Company Name</label>
      <input type="text" id="company-name" placeholder="e.g. Polar Foods, ACI, PRAN..." />
    </div>
    <div class="field">
      <label>Territory Bulk Export (.xlsx)</label>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".xlsx,.xls" />
        <div class="dz-icon">📂</div>
        <div class="dz-text">Click to browse or drag & drop</div>
        <div class="dz-file" id="dz-filename"></div>
      </div>
    </div>
    <div class="error-msg" id="error-msg"></div>
    <button class="btn-primary" id="btn-generate" disabled>Generate Hierarchy</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen">
  <div class="top-bar">
    <span class="company-badge" id="company-display"></span>
    <div class="top-stats" id="top-stats"></div>
    <button class="btn-reset" onclick="resetApp()">↩ Load New File</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('tree',this)">🌳 Hierarchy Tree <span class="tab-badge" id="badge-tree">0</span></button>
    <button class="tab-btn" onclick="switchTab('dup',this)">⚠️ Duplicates <span class="tab-badge" id="badge-dup">0</span></button>
    <button class="tab-btn" onclick="switchTab('summary',this)">📊 Level Summary</button>
    <button class="tab-btn" onclick="switchTab('flow',this)">🔀 Flow View</button>
  </div>

  <div class="tab-panel active" id="tab-tree">
    <div class="tree-toolbar">
      <div class="search-wrap">
        <span class="search-ico">🔍</span>
        <input type="text" id="search-input" placeholder="Search name, code, manager..." oninput="doSearch(this.value)" />
      </div>
      <span class="search-count" id="search-count"></span>
      <button class="btn-sm" onclick="expandAll()">Expand All</button>
      <button class="btn-sm" onclick="collapseAll()">Collapse All</button>
      <button class="btn-sm" onclick="clearSearch()">Clear Search</button>
    </div>
    <div class="tree-container" id="tree-container"></div>
  </div>

  <div class="tab-panel" id="tab-dup">
    <div class="dup-container" id="dup-container"></div>
  </div>

  <div class="tab-panel" id="tab-summary">
    <div class="summary-container" id="summary-container"></div>
  </div>

  <div class="tab-panel" id="tab-flow">
    <div class="flow-toolbar">
      <div class="search-wrap" style="max-width:280px">
        <span class="search-ico">🔍</span>
        <input type="text" id="flow-search" placeholder="Search name or code..." oninput="flowSearch(this.value)" />
      </div>
      <div id="flow-search-results" style="display:none;position:relative;z-index:50;">
        <div id="flow-search-dropdown" style="
          position:absolute;top:4px;left:0;min-width:300px;max-height:260px;overflow-y:auto;
          background:var(--surface);border:1px solid var(--border);border-radius:8px;
          box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:100;
        "></div>
      </div>
      <div class="breadcrumb" id="flow-breadcrumb" style="flex:1">
        <span class="bc-item bc-root" onclick="flowGoRoot()">🏠 Root</span>
      </div>
      <span style="font-size:11px;color:var(--text-dim)">Click node to drill down</span>
    </div>
    <div class="flow-wrap">
      <div class="flow-canvas-wrap" id="flow-canvas-wrap">
        <svg id="flow-svg"></svg>
        <div class="flow-columns" id="flow-columns"></div>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = [
  '#58a6ff','#3fb950','#f78166','#d29922',
  '#bc8cff','#39d353','#ff7b72','#ffa657',
  '#79c0ff','#e3b341','#56d364','#f0883e'
];

let APP = null;

// ── UPLOAD ──
const fileInput = document.getElementById('file-input');
const dropZone  = document.getElementById('drop-zone');
const dzFile    = document.getElementById('dz-filename');
const btnGen    = document.getElementById('btn-generate');
const cmpInput  = document.getElementById('company-name');
let selFile = null;

fileInput.addEventListener('change', e => { if(e.target.files[0]) setFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if(e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
cmpInput.addEventListener('input', checkReady);

function setFile(f) { selFile = f; dzFile.textContent = f.name; checkReady(); }
function checkReady() { btnGen.disabled = !(selFile && cmpInput.value.trim()); }

btnGen.addEventListener('click', () => {
  showErr('');
  showLoading(true);
  setTimeout(() => {
    const reader = new FileReader();
    reader.onload = e => {
      try { processFile(e.target.result, cmpInput.value.trim()); }
      catch(err) { showLoading(false); showErr('Error: ' + err.message); }
    };
    reader.readAsArrayBuffer(selFile);
  }, 60);
});

function showLoading(v) { document.getElementById('loading-overlay').classList.toggle('show', v); }
function showErr(m) { const el = document.getElementById('error-msg'); el.textContent = m; el.style.display = m ? 'block' : 'none'; }

// ── PARSE ──
function processFile(buf, company) {
  const wb = XLSX.read(buf, {type:'arraybuffer'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if (!rows.length) throw new Error('Empty file');

  const headers = rows[0].map(h => String(h||'').trim());

  // Detect level triplets: Code | LevelName | Manager (repeating pattern)
  const levels = [];
  let i = 0;
  while (i < headers.length) {
    if (headers[i].toLowerCase() === 'code' && i+1 < headers.length) {
      const nm = headers[i+1];
      if (nm && nm.toLowerCase() !== 'code' && nm.toLowerCase() !== 'created at') {
        levels.push({ name: nm, cIdx: i, nIdx: i+1, mIdx: i+2 });
        i += 3; continue;
      }
    }
    i++;
  }
  if (!levels.length) throw new Error('Cannot detect hierarchy levels.');

  // Build unique node registry per level
  // Key per level: code||name (normalized)
  const nodeReg = levels.map(() => new Map()); // levelIdx -> Map<key, node>

  function nodeKey(code, name) {
    return (String(code).trim().toLowerCase() + '||' + String(name).trim().toLowerCase());
  }

  function getOrCreate(li, code, name, managers) {
    const key = nodeKey(code, name);
    if (!nodeReg[li].has(key)) {
      nodeReg[li].set(key, {
        id: li + '_' + key,
        code: String(code).trim(),
        name: String(name).trim(),
        level: li,
        levelName: levels[li].name,
        managers: [],
        children: [],
        childKeys: new Set(),
        parent: null,
      });
    }
    const node = nodeReg[li].get(key);
    // merge managers
    managers.forEach(m => { if(m && !node.managers.includes(m)) node.managers.push(m); });
    return node;
  }

  // Process rows
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    if (!row || row.every(c => !c)) continue;

    // Collect filled levels in this row, sorted by column index
    const filledLevels = [];
    for (let li = 0; li < levels.length; li++) {
      const lv = levels[li];
      const code = lv.cIdx < row.length ? String(row[lv.cIdx]||'').trim() : '';
      const name = lv.nIdx < row.length ? String(row[lv.nIdx]||'').trim() : '';
      const mgrRaw = lv.mIdx < row.length ? String(row[lv.mIdx]||'').trim() : '';
      if (!name && !code) continue;
      const mgrs = mgrRaw ? mgrRaw.split(',').map(m=>m.trim()).filter(Boolean) : [];
      filledLevels.push({ li, code, name, mgrs, colIdx: lv.cIdx });
    }

    // Sort by column index — this gives correct parent→child order
    filledLevels.sort((a,b) => a.colIdx - b.colIdx);

    // Build chain
    let prevNode = null;
    for (const fl of filledLevels) {
      const node = getOrCreate(fl.li, fl.code, fl.name, fl.mgrs);
      if (prevNode && node !== prevNode) {
        // Link node as child of prevNode if not already
        const ck = node.id;
        if (!prevNode.childKeys.has(ck)) {
          prevNode.childKeys.add(ck);
          prevNode.children.push(node);
          if (!node.parent) node.parent = prevNode;
        }
      }
      prevNode = node;
    }
  }

  // Collect root nodes: ONLY level-0 nodes (true roots)
  // Other parent-less nodes are orphans due to incomplete rows — ignore them
  const allNodes = [];
  nodeReg.forEach(m => m.forEach(n => allNodes.push(n)));
  
  // Primary: level-0 nodes are always roots
  let rootNodes = [...nodeReg[0].values()];
  
  // Fallback: if level-0 is empty, find lowest-level nodes with no parent
  if (!rootNodes.length) {
    rootNodes = allNodes.filter(n => !n.parent);
  }

  // Find duplicates: same name, different code, within same level
  const duplicates = findDups(nodeReg, levels);

  // Stats
  const stats = levels.map((lv, li) => ({
    name: lv.name,
    count: nodeReg[li].size,
    color: COLORS[li % COLORS.length]
  }));

  APP = { levels, nodeReg, rootNodes, duplicates, stats, company };
  renderApp();
  showLoading(false);
}

function findDups(nodeReg, levels) {
  const groups = [];
  levels.forEach((lv, li) => {
    const byName = new Map();
    nodeReg[li].forEach(node => {
      const k = node.name.toLowerCase().trim();
      if (!byName.has(k)) byName.set(k, []);
      byName.get(k).push(node);
    });
    byName.forEach(nodes => {
      const codes = [...new Set(nodes.map(n => n.code))];
      if (codes.length > 1) {
        groups.push({
          name: nodes[0].name,
          levelName: lv.name,
          instances: nodes.map(n => ({
            code: n.code,
            name: n.name,
            parent: n.parent ? { code: n.parent.code, name: n.parent.name, levelName: n.parent.levelName } : null,
            children: n.children.map(c => ({ code: c.code, name: c.name, levelName: c.levelName }))
          }))
        });
      }
    });
  });
  return groups;
}

// ── TREE ──
function renderTree() {
  const c = document.getElementById('tree-container');
  c.innerHTML = '';
  APP.rootNodes.forEach(node => c.appendChild(buildNode(node, 0)));
}

function buildNode(node, depth) {
  const color = COLORS[node.level % COLORS.length];
  const hasKids = node.children.length > 0;

  const wrap = document.createElement('div');
  wrap.className = 'tn';

  const row = document.createElement('div');
  row.className = 'tn-row';

  // Indent guides (depth visual lines)
  const guides = document.createElement('div');
  guides.className = 'tn-guides';
  for (let d = 0; d < depth; d++) {
    const g = document.createElement('div');
    g.className = 'tn-guide';
    guides.appendChild(g);
  }

  const toggle = document.createElement('div');
  toggle.className = 'tn-toggle' + (hasKids ? '' : ' leaf');
  toggle.innerHTML = hasKids ? '▶' : '·';

  const card = document.createElement('div');
  card.className = 'node-card';
  card.dataset.st = [node.name, node.code, ...node.managers].join(' ').toLowerCase();

  const top = document.createElement('div');
  top.className = 'node-top';

  const badge = document.createElement('span');
  badge.className = 'lv-badge';
  badge.style.cssText = `background:${color}20;color:${color};border:1px solid ${color}40`;
  badge.textContent = node.levelName;

  const codeEl = document.createElement('span');
  codeEl.className = 'node-code';
  codeEl.textContent = node.code || '—';

  const nameEl = document.createElement('span');
  nameEl.className = 'node-name';
  nameEl.textContent = node.name;

  top.append(badge, codeEl, nameEl);
  card.appendChild(top);

  if (node.managers.length) {
    const mgrs = document.createElement('div');
    mgrs.className = 'node-mgrs';
    node.managers.forEach(m => {
      const chip = document.createElement('span');
      chip.className = 'mgr-chip';
      chip.textContent = m;
      mgrs.appendChild(chip);
    });
    card.appendChild(mgrs);
  }

  row.append(guides, toggle, card);
  wrap.appendChild(row);

  const kids = document.createElement('div');
  kids.className = 'tn-children collapsed';
  if (hasKids) {
    node.children.forEach(child => kids.appendChild(buildNode(child, depth+1)));
    toggle.onclick = () => {
      const open = kids.classList.contains('collapsed');
      kids.classList.toggle('collapsed', !open);
      toggle.innerHTML = open ? '▼' : '▶';
    };
  }
  wrap.appendChild(kids);
  return wrap;
}

function expandAll()  {
  document.querySelectorAll('.tn-children').forEach(el => el.classList.remove('collapsed'));
  document.querySelectorAll('.tn-toggle:not(.leaf)').forEach(el => el.innerHTML='▼');
}
function collapseAll() {
  document.querySelectorAll('.tn-children').forEach(el => el.classList.add('collapsed'));
  document.querySelectorAll('.tn-toggle:not(.leaf)').forEach(el => el.innerHTML='▶');
}

// ── SEARCH ──
function doSearch(q) {
  const term = q.trim().toLowerCase();
  let cnt = 0;
  document.querySelectorAll('.node-card').forEach(card => {
    card.classList.remove('search-match');
    if (term && card.dataset.st && card.dataset.st.includes(term)) {
      card.classList.add('search-match');
      cnt++;
      // expand ancestors
      let el = card.closest('.tn');
      while (el) {
        const par = el.parentElement?.closest('.tn');
        if (par) {
          const kEl = par.querySelector(':scope>.tn-children');
          const tEl = par.querySelector(':scope>.tn-row>.tn-toggle');
          if (kEl) { kEl.classList.remove('collapsed'); }
          if (tEl && !tEl.classList.contains('leaf')) tEl.innerHTML = '▼';
        }
        el = par;
      }
    }
  });
  document.getElementById('search-count').textContent = term ? `${cnt} match${cnt!==1?'es':''}` : '';
}
function clearSearch() { document.getElementById('search-input').value=''; doSearch(''); }

function renderDups() {
  const c = document.getElementById('dup-container');
  const { duplicates } = APP;
  if (!duplicates.length) {
    c.innerHTML = `<div class="dup-empty"><div class="ico">✅</div><div>No duplicates found — all names are unique within each level.</div></div>`;
    return;
  }
  c.innerHTML = '';
  duplicates.forEach(g => {
    const grp = document.createElement('div');
    grp.className = 'dup-group';
    grp.innerHTML = `<div class="dup-hdr"><span class="dup-name">${esc(g.name)}</span><span class="dup-lv">Level: ${esc(g.levelName)}</span><span class="dup-cnt">${g.instances.length} instances</span></div>`;
    const items = document.createElement('div');
    items.className = 'dup-items';
    g.instances.forEach(inst => {
      const item = document.createElement('div');
      item.className = 'dup-item';
      const pHtml = inst.parent
        ? `<span>${esc(inst.parent.levelName)}</span><span>${esc(inst.parent.code||'—')}</span><span>${esc(inst.parent.name)}</span>`
        : `<span style="color:var(--text-dim)">Root level</span>`;
      const cHtml = inst.children.length
        ? inst.children.slice(0,10).map(c=>`<span>${esc(c.name)}${c.code?' ['+esc(c.code)+']':''}</span>`).join('')
          + (inst.children.length>10?`<span>+${inst.children.length-10} more</span>`:'')
        : `<span style="color:var(--text-dim)">No children</span>`;
      item.innerHTML = `
        <div class="dup-item-top"><span class="dup-code">CODE: ${esc(inst.code||'—')}</span><span style="font-size:12px;color:var(--text-muted)">${esc(inst.name)}</span></div>
        <div class="dup-ctx">
          <div class="dup-ctx-row"><span class="dclbl">⬆ Parent</span><div class="dcval">${pHtml}</div></div>
          <div class="dup-ctx-row"><span class="dclbl">⬇ Children</span><div class="dcval">${cHtml}</div></div>
        </div>`;
      items.appendChild(item);
    });
    grp.appendChild(items);
    c.appendChild(grp);
  });
}

// ── FLOW SEARCH ──
function flowSearch(q) {
  const term = q.trim().toLowerCase();
  const dd = document.getElementById('flow-search-dropdown');
  const wrap = document.getElementById('flow-search-results');

  if (!term || !APP) { wrap.style.display = 'none'; dd.innerHTML = ''; return; }

  // Search all nodes across all levels
  const matches = [];
  APP.nodeReg.forEach(levelMap => {
    levelMap.forEach(node => {
      if (node.name.toLowerCase().includes(term) || node.code.toLowerCase().includes(term)) {
        matches.push(node);
      }
    });
  });

  if (!matches.length) {
    dd.innerHTML = `<div style="padding:12px 14px;color:var(--text-muted);font-size:12px">No results found</div>`;
    wrap.style.display = 'block';
    return;
  }

  dd.innerHTML = '';
  matches.slice(0, 30).forEach(node => {
    const color = COLORS[node.level % COLORS.length];
    const item = document.createElement('div');
    item.style.cssText = 'padding:9px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;transition:background 0.15s;';
    item.innerHTML = `
      <span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:${color}20;color:${color};border:1px solid ${color}40;white-space:nowrap">${esc(node.levelName)}</span>
      <span style="font-size:12px;font-weight:600;color:var(--text);flex:1">${esc(node.name)}</span>
      <span style="font-family:monospace;font-size:10px;color:var(--text-dim)">${esc(node.code)}</span>
    `;
    item.onmouseenter = () => item.style.background = 'var(--surface2)';
    item.onmouseleave = () => item.style.background = '';
    item.onclick = () => {
      // Close dropdown
      wrap.style.display = 'none';
      document.getElementById('flow-search').value = '';
      // Navigate to this node
      flowNavigateTo(node);
    };
    dd.appendChild(item);
  });

  if (matches.length > 30) {
    const more = document.createElement('div');
    more.style.cssText = 'padding:8px 14px;color:var(--text-muted);font-size:11px;text-align:center;';
    more.textContent = `+${matches.length - 30} more results — refine your search`;
    dd.appendChild(more);
  }

  wrap.style.display = 'block';
}

// Navigate flow view to show a specific node with full context
function flowNavigateTo(node) {
  // Build ancestor chain
  const chain = [];
  let cur = node;
  while (cur) { chain.unshift(cur); cur = cur.parent; }
  // chain[0] = root, chain[last] = target node

  // Set flowPath to the target node's path
  flowPath = chain;

  // Render with the target node as active
  renderFlow(node);

  // After render, scroll the target node into view and highlight it
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const allFnNodes = document.querySelectorAll('.flow-node');
      allFnNodes.forEach(el => {
        if (el.dataset.nodeId === node.id) {
          el.classList.add('fn-search-hit');
          el.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
          // Remove highlight after 2s
          setTimeout(() => el.classList.remove('fn-search-hit'), 2500);
        }
      });
    });
  });
}

// Close dropdown when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('#flow-search-results') && !e.target.closest('#flow-search')) {
    const wrap = document.getElementById('flow-search-results');
    if (wrap) wrap.style.display = 'none';
  }
});

// ── FLOW VIEW ──
// flowPath = array of nodes from root to current selection (breadcrumb)
let flowPath = [];

function flowGoRoot() {
  flowPath = [];
  renderFlow(null);
}

function flowDrillDown(node) {
  // Build path to this node by traversing parent chain
  const chain = [];
  let n = node;
  while (n) { chain.unshift(n); n = n.parent; }
  flowPath = chain;
  renderFlow(node);
}

function flowGoLevel(idx) {
  // Click on a breadcrumb item
  if (idx < 0) { flowPath = []; renderFlow(null); return; }
  flowPath = flowPath.slice(0, idx + 1);
  renderFlow(flowPath[flowPath.length - 1] || null);
}

function renderFlow(activeNode) {
  const colsEl = document.getElementById('flow-columns');
  const svg    = document.getElementById('flow-svg');
  const bc     = document.getElementById('flow-breadcrumb');
  if (!APP) return;

  // Build breadcrumb
  bc.innerHTML = `<span class="bc-item bc-root" onclick="flowGoRoot()">🏠 Root</span>`;
  flowPath.forEach((n, i) => {
    bc.innerHTML += `<span class="bc-sep">›</span>`;
    if (i < flowPath.length - 1) {
      bc.innerHTML += `<span class="bc-item" onclick="flowGoLevel(${i})">${esc(n.name)}</span>`;
    } else {
      bc.innerHTML += `<span class="bc-current">${esc(n.name)}</span>`;
    }
  });

  // Determine columns to show
  // If no active node → show level-0 (roots) and their children levels
  // If active node → show: ancestors chain + active node's level + children level + grandchildren level (up to 3 ahead)
  colsEl.innerHTML = '';
  svg.innerHTML = '';

  let columnsData = []; // [{levelName, nodes, activeNode}]

  if (!activeNode) {
    // Show root nodes grouped by their levelName
    const rootsByLevel = new Map();
    APP.rootNodes.forEach(n => {
      if (!rootsByLevel.has(n.levelName)) rootsByLevel.set(n.levelName, []);
      rootsByLevel.get(n.levelName).push(n);
    });
    rootsByLevel.forEach((nodes, lvName) => {
      columnsData.push({ levelName: lvName, nodes, selectedNode: null, dimOthers: false });
    });
    // Add first children level if all roots have same children level
    const allChildren = APP.rootNodes.flatMap(n => n.children);
    if (allChildren.length > 0) {
      const childLvName = allChildren[0].levelName;
      columnsData.push({ levelName: childLvName, nodes: allChildren, selectedNode: null, dimOthers: false });
    }
  } else {
    // Build ancestor columns (dimmed, show only selected)
    const ancestors = [];
    let cur = activeNode.parent;
    while (cur) { ancestors.unshift(cur); cur = cur.parent; }

    // Ancestor columns — each shows siblings but dims non-selected
    ancestors.forEach(anc => {
      const siblings = anc.parent ? anc.parent.children : APP.rootNodes.filter(n => n.levelName === anc.levelName);
      columnsData.push({ levelName: anc.levelName, nodes: siblings, selectedNode: anc, dimOthers: true });
    });

    // Active node's column — siblings, active highlighted
    const activeSiblings = activeNode.parent
      ? activeNode.parent.children
      : APP.rootNodes.filter(n => n.levelName === activeNode.levelName);
    columnsData.push({ levelName: activeNode.levelName, nodes: activeSiblings, selectedNode: activeNode, dimOthers: true });

    // Children column
    if (activeNode.children.length > 0) {
      columnsData.push({ levelName: activeNode.children[0].levelName, nodes: activeNode.children, selectedNode: null, dimOthers: false });

      // Grandchildren (if any)
      const allGrand = activeNode.children.flatMap(c => c.children);
      if (allGrand.length > 0) {
        columnsData.push({ levelName: allGrand[0].levelName, nodes: allGrand, selectedNode: null, dimOthers: false });
      }
    }
  }

  if (columnsData.length === 0) {
    colsEl.innerHTML = `<div class="flow-empty"><div style="font-size:32px">🌱</div><div>No data to display.<br>Generate a hierarchy first.</div></div>`;
    return;
  }

  // Find max descendant count per column for bar scaling
  function countDescendants(node) {
    if (!node._descCount) {
      node._descCount = node.children.length === 0 ? 1
        : node.children.reduce((s, c) => s + countDescendants(c), 0);
    }
    return node._descCount;
  }

  const nodeEls = new Map(); // node.id → DOM element (for SVG lines)

  columnsData.forEach((col, ci) => {
    const maxDesc = Math.max(...col.nodes.map(n => countDescendants(n)), 1);

    const colEl = document.createElement('div');
    colEl.className = 'flow-col';
    colEl.dataset.ci = ci;

    const hdr = document.createElement('div');
    hdr.className = 'flow-col-header';
    hdr.textContent = col.levelName;
    colEl.appendChild(hdr);

    col.nodes.forEach(node => {
      const desc = countDescendants(node);
      const pct  = Math.max(4, Math.round((desc / maxDesc) * 100));
      const isActive   = col.selectedNode && node.id === col.selectedNode.id;
      const isChildActive = activeNode && activeNode.children.some(c => c.id === node.id);
      const isDim = col.dimOthers && col.selectedNode && node.id !== col.selectedNode.id;

      const el = document.createElement('div');
      el.className = 'flow-node' +
        (isActive ? ' fn-active' : '') +
        (isDim ? ' fn-dim' : '') +
        (isChildActive ? ' fn-child-active' : '');

      el.dataset.nodeId = node.id;

      const color = COLORS[node.level % COLORS.length];
      const barColor = isActive ? '#58a6ff' : isChildActive ? '#3fb950' : color;

      el.innerHTML = `
        <div class="fn-name">${esc(node.name)}</div>
        ${node.code ? `<div class="fn-code">${esc(node.code)}</div>` : ''}
        <div class="fn-bar-wrap"><div class="fn-bar" style="width:${pct}%;background:${barColor}"></div></div>
        <div class="fn-count">${desc} ${desc === 1 && node.children.length === 0 ? 'leaf' : 'sub-nodes'}</div>
        ${node.managers.length ? `<div class="fn-mgr">👤 ${esc(node.managers.slice(0,2).join(', '))}${node.managers.length > 2 ? ' +' + (node.managers.length-2) : ''}</div>` : ''}
      `;

      el.onclick = () => {
        if (node.children.length > 0) {
          flowDrillDown(node);
        } else {
          // Leaf — just highlight, show info
          flowDrillDown(node);
        }
      };

      colEl.appendChild(el);
      nodeEls.set(node.id, el);
    });

    colsEl.appendChild(colEl);

    // Add spacer between columns (for SVG curves)
    if (ci < columnsData.length - 1) {
      const spacer = document.createElement('div');
      spacer.className = 'flow-col-spacer';
      colsEl.appendChild(spacer);
    }
  });

  // Draw SVG curves after DOM is laid out
  requestAnimationFrame(() => drawFlowCurves(columnsData, nodeEls, activeNode, svg, colsEl));
}

function drawFlowCurves(columnsData, nodeEls, activeNode, svg, colsEl) {
  const wrap = document.getElementById('flow-canvas-wrap');
  const wrapRect = wrap.getBoundingClientRect();
  const colsRect = colsEl.getBoundingClientRect();

  const W = colsEl.scrollWidth;
  const H = Math.max(colsEl.scrollHeight, wrap.clientHeight);
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  // Draw connections: for each column pair, connect selectedNode to its children
  for (let ci = 0; ci < columnsData.length - 1; ci++) {
    const col = columnsData[ci];
    const nextCol = columnsData[ci + 1];
    if (!col.selectedNode) continue;

    const parentEl = nodeEls.get(col.selectedNode.id);
    if (!parentEl) continue;

    const children = col.selectedNode.children.filter(c =>
      nextCol.nodes.some(n => n.id === c.id)
    );

    children.forEach(child => {
      const childEl = nodeEls.get(child.id);
      if (!childEl) return;

      const pRect = parentEl.getBoundingClientRect();
      const cRect = childEl.getBoundingClientRect();

      const ox = pRect.right - wrapRect.left + wrap.scrollLeft;
      const oy = pRect.top + pRect.height / 2 - wrapRect.top + wrap.scrollTop;
      const ix = cRect.left - wrapRect.left + wrap.scrollLeft;
      const iy = cRect.top + cRect.height / 2 - wrapRect.top + wrap.scrollTop;

      const mx = (ox + ix) / 2;

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', `M ${ox} ${oy} C ${mx} ${oy}, ${mx} ${iy}, ${ix} ${iy}`);
      path.setAttribute('stroke', '#58a6ff55');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('fill', 'none');
      svg.appendChild(path);
    });
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
